name: Banking Microservices CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 📥 Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # ☕ Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ⚡ Cache
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      # ========================
      # 🔐 Docker Login (once)
      # ========================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ========================
      # 🚀 AUTH SERVICE
      # ========================

      - name: Build Auth Service
        run: mvn clean verify
        working-directory: auth-service

      - name: Build Auth Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service:latest .
        working-directory: auth-service

      - name: Push Auth Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:latest

      # ========================
      # 🚀 API GATEWAY
      # ========================

      - name: Build API Gateway
        run: mvn clean verify
        working-directory: api-gateway

      - name: Build Gateway Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest .
        working-directory: api-gateway

      - name: Push Gateway Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest