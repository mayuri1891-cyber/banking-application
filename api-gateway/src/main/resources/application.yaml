server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:80
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0
jwt:
  secret: your_very_long_and_secure_random_secret_key_here
management:
  endpoints:
    web:
      exposure:
        include: "*"
# 🧾 Logging
logging:
  level:
    root: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"